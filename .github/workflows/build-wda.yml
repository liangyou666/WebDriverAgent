name: Build WebDriverAgent IPA

on:
  workflow_dispatch:
    inputs:
      scheme:
        description: 'Xcode scheme to build'
        required: false
        default: 'WebDriverAgentRunner'
        type: string
      ios_version:
        description: 'Minimum iOS version'
        required: false
        default: '14.0'
        type: string

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build WebDriverAgent (unsigned)
        env:
          SCHEME: ${{ inputs.scheme || 'WebDriverAgentRunner' }}
        run: |
          chmod +x ./Scripts/ci/build-unsigned.sh
          ./Scripts/ci/build-unsigned.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: WebDriverAgent
          path: |
            wda-build-output/WebDriverAgent-Runner.zip
            wda-build-output/xcodebuild.log
          retention-days: 7
          if-no-files-found: error
